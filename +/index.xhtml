<!DOCTYPE HTML PUBLIC "" "">

<html xmlns="http://www.w3.org/1999/xhtml">
    <head>
        
        <title>{dir-listing}</title>
        <link rel="stylesheet" href="/assets/styles/css/main.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <script>

            const fetchDirectoryContents = async () => {

                const _TARGET_REPO_DIR = "https://api.github.com/repos/BenMullan/BitsAndBobs/contents/MiscSource";

                const response = await fetch(_TARGET_REPO_DIR);
                const files = await response.json();

                document.querySelector("#dir-name-title").textContent = _TARGET_REPO_DIR;
                const ul = document.querySelector(".dirlisting-container ul");
                ul.innerHTML = "";

                files.forEach(
                    file => {

                        const li = document.createElement("li");
                        li.className = "dirlisting-item";
                        
                        const a = document.createElement("a");
                        a.target = "_blank";
                        a.textContent = file.name;

                        // htm/html/xhtml   → render as Document in new tab
                        // other files      → download as text/plain directly
                        // directories      → link to GitHub page
                        
                        if (file.type === "dir") {
                            a.href = file.html_url;
                        } else if (file.type === "file") {

                            const fileExtension = file.name.split(".").pop().toLowerCase();

                            if (["htm", "html", "xhtml"].includes(fileExtension)) {
                                a.href = "#";
                                a.addEventListener(
                                    "click",
                                    async (event) => {
                                        event.preventDefault();

                                        const fileResponse = await fetch(file.download_url);
                                        const fileContent = await fileResponse.text();

                                        const newWindow = window.open("", "_blank");
                                        newWindow.document.open();
                                        newWindow.document.write(fileContent);
                                        newWindow.document.close();
                                    }
                                );
                            } else {
                                a.href = file.download_url;
                            }

                        }

                        li.appendChild(a);
                        ul.appendChild(li);

                    }
                );
            }

            // wunse d' page loads, fetch() the repository dir-listing, and render hereonto
            document.addEventListener("DOMContentLoaded", fetchDirectoryContents);

        </script>

    </head>
    <body>

        <header>
            <h1><span id="dir-name-title">(no content loaded)</span></h1>
        </header>

        <main class="dirlisting-container">

            <ul>
                <li class="dirlisting-item"><a href="./">(no content loaded)</a></li>
            </ul>

        </main>

        <footer>Ben Mullan © 2026</footer>

    </body>
</html>
